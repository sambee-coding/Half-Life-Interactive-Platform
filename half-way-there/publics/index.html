<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half-Life Interactive PlatForm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kelly+Slab&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="landing-page">
    <h1>Welcome to the half-life interactive platform</h1>
    <img src="assets/undraw_graduation_u7uc.svg" class="img-fluid mx-auto d-block mb-5" alt="Half-Life Platform Mockup">
    </section>
    
   <section id="TimeCapsule" class="py-5">
    <div class="container">
      <div class="row align-items-center" id="contian-ner">
       
  <!--left column for the illustration-->
        <div class="col-md-6">
          <img src="assets/undraw_people_ka7y.svg" class="img-fluid rounded float-start" alt="illustration spot">
        </div>
 <!---right column time capsule form part-->
        <div class="col-md-6 ">
           <div class="time-capsule p-4 border rounded shadow-sm">
            <h2 class="mb-4 " id="time-capsule-text">Time Capsule</h2>
            <form>
              <div class="mb-3">
                <label for="message" class="form-label">Enter Your Message</label>
                <textarea class="form-control" id="message" placeholder="Write something for your future self...." rows="8"></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Submit</button>
            </form>
           </div> 
        </div>
      </div>
    </div>
   </section>

   <section id="Fav-photo-of-the-festival">
    <div class="container">
      <div class="row g-4" id="Fav-photos">
        <div class="col-md-4">
          <div class="photo-box"></div>
        </div>
          <div class="col-md-4">
               <div class="photo-box"></div>
          </div>
            <div class="col-md-4">
                 <div class="photo-box"></div>
            </div>
      </div>
      <button class="btn btn-primary " id="btn-for-fav-photo">Enter</button>
    </div>
   </section>
   <section class="footer">
   <footer class="bg-dark text-light py-4 mt-5">
  <div class="container">
    <div class="row">

      <div class="col-md-4">
        <h5>About</h5>
        <p>This festival celebrates creativity and memories.</p>
      </div>

      <div class="col-md-4">
        <h5>Quick Links</h5>
        <ul class="list-unstyled">
          <li><a href="#" class="text-light text-decoration-none">Home</a></li>
          <li><a href="gallery.html" class="text-light text-decoration-none">Gallery</a></li>
          <li><a href="contact.html" class="text-light text-decoration-none">Contact</a></li>
        </ul>
      </div>

      <div class="col-md-4">
        <h5>Contact</h5>
        <p>Email: example@email.com</p>
      </div>

    </div>

    <hr class="border-light">

    <div class="text-center">
      <p class="mb-0">© 2026 Festival Project. All rights reserved.</p>
    </div>

  </div>
</footer>
   </section>
</body>
</html>
